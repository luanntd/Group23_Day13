service: day13-observability-lab
window: 28d
slis:
  latency_p95_ms:
    objective: 3000
    target: 99.5
    note: 99.5% of 28d windows must have P95 < 3000ms
  error_rate_pct:
    objective: 2
    target: 99.0
    note: Error rate must stay below 2% in 99% of windows
  daily_cost_usd:
    objective: 2.5
    target: 100.0
    note: Daily cost must not exceed $2.50
  quality_score_avg:
    objective: 0.75
    target: 95.0
    note: 95% of windows must have quality avg >= 0.75
